services:

  # HTTP Bridge — cho TradingBridgeEA (DLL HTTP mode)
  http-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-http-bridge
    ports:
      - "${MT5_HTTP_PORT:-1080}:8080"
    environment:
      - MT5_HTTP_PORT=8080
      - BINARY=http-bridge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - mt5-net
      # - dokploy-network

  # TCP Bridge — cho TradingBridgeSocketEA (DLL Socket mode)
  tcp-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-tcp-bridge
    ports:
      - "${MT5_TCP_PORT:-1081}:8081"
    environment:
      - MT5_TCP_PORT=8081
      - RELAY_HOST=relay:8082
      - BINARY=tcp-bridge
      - DATABASE_URL=postgres://admin:admin123@postgres:5432/mt5_bridge?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8081"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - mt5-net

  # Relay — nhận signal từ TCP bridge rồi forward lên server TCP khác
  # Ví dụ: forward sang server copy-trade 103.72.56.53:8080
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-relay
    ports:
      - "${RELAY_PORT:-1082}:8082"
    environment:
      - RELAY_PORT=8082
      - FORWARD_TO_HOST=${FORWARD_TO_HOST:-}
      - FORWARD_TO_PORT=${FORWARD_TO_PORT:-}
      - BINARY=relay
    volumes:
      - ./logs:/app/logs:rw
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8082"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - mt5-net

  # API Server — Master-Follower management API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-api
    ports:
      - "${API_PORT:-1083}:8083"
    environment:
      - API_PORT=8083
      - BINARY=api
      - DATABASE_URL=postgres://admin:admin123@postgres:5432/mt5_bridge?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - mt5-net


networks:
  mt5-net:
    name: mt5-net
    driver: bridge
  # dokploy-network:
  #   external: true
